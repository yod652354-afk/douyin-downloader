<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音收藏下载器</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">抖音收藏下载器</span>
    </div>
    <div id="status-badge" class="badge badge-idle">空闲</div>
  </header>

  <div class="card" id="scan-section">
    <p class="hint" style="color: #4ade80;">✅ 自动拦截模式已开启</p>
    <p class="hint" style="margin-bottom:0;">请在抖音收藏页<strong>向下滚动网页</strong>，插件会自动抓取加载的视频。</p>
  </div>

  <div id="queue-section" class="hidden">
    <div class="stats-row">
      <div class="stat">
        <div id="stat-total" class="stat-num">0</div>
        <div class="stat-label">总计</div>
      </div>
      <div class="stat">
        <div id="stat-done" class="stat-num done">0</div>
        <div class="stat-label">完成</div>
      </div>
      <div class="stat">
        <div id="stat-failed" class="stat-num failed">0</div>
        <div class="stat-label">失败</div>
      </div>
      <div class="stat">
        <div id="stat-remain" class="stat-num remain">0</div>
        <div class="stat-label">剩余</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>

    <div class="controls">
      <button id="btn-start" class="btn btn-success">▶ 开始</button>
      <button id="btn-pause" class="btn btn-warning hidden">⏸ 暂停</button>
      <button id="btn-resume" class="btn btn-success hidden">▶ 继续</button>
      <button id="btn-rescan" class="btn btn-outline">🔄 重新扫描</button>
    </div>

    <div id="video-list" class="video-list"></div>
  </div>
  <div id="toast" class="toast hidden"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
